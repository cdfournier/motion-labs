<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Motion Lab - .tabs/tests</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="lab">
      <header class="lab-header">
        <p class="lab-header__name">.tabs/tests</p>
        <a class="lab-header__link" href="./index.html">Back to index</a>
      </header>

      <section class="preview-pane" aria-label="Component preview">
        <div class="preview-frame">
          <article class="tabs-tests" data-component="tabs-tests">
            <section class="tabs-tests__tablist" aria-label="Tab list">
              <ol class="tabs-tests__list" id="tabsList"></ol>
              <div class="tabs-tests__list-cta-wrap">
                <a href="#" class="tabs-tests__list-cta">See All Tests</a>
              </div>
            </section>

            <section class="tabs-tests__panel" aria-label="Panel preview">
              <figure class="tabs-tests__hero">
                <div class="tabs-tests__hero-shell" id="tabsHeroShell"></div>
              </figure>
              <div class="tabs-tests__side">
                <div class="tabs-tests__side-shell" id="tabsSideShell"></div>
              </div>
            </section>
          </article>
        </div>
      </section>

      <section class="controls" aria-label="Motion controls">
        <div class="controls__row">
          <label class="field">
            <span>State</span>
            <select id="activeState"></select>
          </label>
          <label class="field">
            <span>Transition</span>
            <select id="transitionType">
              <option value="slide-fade">Slide + Fade</option>
              <option value="crossfade">Crossfade</option>
              <option value="swap">Swap (No Motion)</option>
            </select>
          </label>
          <label class="field">
            <span>Ease</span>
            <select id="easeName">
              <option value="power2.out">power2.out</option>
              <option value="power3.out">power3.out</option>
              <option value="power1.out">power1.out</option>
              <option value="sine.out">sine.out</option>
              <option value="expo.out">expo.out</option>
            </select>
          </label>
        </div>

        <div class="controls__row">
          <label class="field field--range">
            <span>Panel/Tab Stagger <output id="staggerOut">0s</output></span>
            <input id="stagger" type="range" min="-0.6" max="0.6" step="0.01" value="0" />
          </label>
          <label class="field">
            <span>Masking</span>
            <select id="maskingMode">
              <option value="track">Clipped Track</option>
              <option value="free-fade">Free Fade</option>
            </select>
          </label>
          <label class="field">
            <span>Direction</span>
            <select id="directionMode">
              <option value="auto">Auto (By Tab Index)</option>
              <option value="forward">Forward</option>
              <option value="reverse">Reverse</option>
            </select>
          </label>
        </div>

        <div class="controls__row">
          <label class="field field--range">
            <span>Duration <output id="durationOut">0.55s</output></span>
            <input id="duration" type="range" min="0" max="1.5" step="0.01" value="0.55" />
          </label>
          <label class="field field--range">
            <span>Panel Shift <output id="panelShiftOut">26px</output></span>
            <input id="panelShift" type="range" min="0" max="80" step="1" value="26" />
          </label>
          <label class="field field--range">
            <span>Tab Duration <output id="tabDurationOut">0.35s</output></span>
            <input id="tabDuration" type="range" min="0" max="1.5" step="0.01" value="0.35" />
          </label>
        </div>

        <div class="controls__row controls__row--actions">
          <button type="button" id="copyJson">Copy JSON</button>
          <button type="button" id="copyCss">Copy CSS</button>
          <button type="button" id="resetSettings">Reset</button>
          <button type="button" id="copyUrl">Copy URL</button>
        </div>

        <div class="exports">
          <label class="field field--code">
            <span>JSON</span>
            <textarea id="jsonExport" readonly></textarea>
          </label>
          <label class="field field--code">
            <span>CSS (portable subset)</span>
            <textarea id="cssExport" readonly></textarea>
          </label>
        </div>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
    <script type="module" src="./app.js"></script>
  </body>
</html>
