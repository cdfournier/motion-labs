<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Motion Lab - .banner/tests-carousel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Cormorant+Garamond:wght@400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="lab">
      <header class="lab-header">
        <a class="lab-header__link" href="./index.html">Back to index</a>
        <span class="lab-header__sep" aria-hidden="true">/</span>
        <p class="lab-header__name">.banner/tests-carousel</p>
      </header>

      <section class="preview-pane" aria-label="Component preview">
        <div class="preview-frame" data-preview-width="1280">
          <section class="banner-tests-carousel" data-component="banner-tests-carousel">
            <div class="banner-tests-carousel__shell" id="testsCarouselShell"></div>
            <ul class="banner-tests-carousel__indicators" id="testsCarouselIndicators"></ul>
          </section>
        </div>
      </section>

      <section class="controls" aria-label="Motion controls">
        <div class="controls__row">
          <label class="field">
            <span>Motion Style</span>
            <select id="motionStyle">
              <option value="custom">Custom</option>
              <option value="subtle">Subtle</option>
              <option value="balanced">Balanced</option>
              <option value="dramatic">Dramatic + Graceful</option>
            </select>
          </label>
          <label class="field">
            <span>State</span>
            <select id="activeState"></select>
          </label>
          <label class="field">
            <span>Transition</span>
            <select id="transitionType">
              <option value="staged-fade">Staged Fade</option>
              <option value="crossfade">Crossfade</option>
              <option value="swap">Swap (No Motion)</option>
            </select>
          </label>
        </div>

        <div class="controls__row">
          <label class="field">
            <span>Autoplay</span>
            <select id="autoplay">
              <option value="on">On</option>
              <option value="off">Off</option>
            </select>
          </label>
          <label class="field">
            <span>Interaction Controls</span>
            <select id="interactionControls">
              <option value="on">On</option>
              <option value="off">Off</option>
            </select>
          </label>
          <label class="field">
            <span>Ease</span>
            <select id="easeName">
              <option value="power4.out">power4.out</option>
              <option value="power3.out">power3.out</option>
              <option value="power2.out">power2.out</option>
              <option value="sine.out">sine.out</option>
              <option value="expo.out">expo.out</option>
            </select>
          </label>
          <label class="field field--range">
            <span>Dwell <output id="dwellOut">10s</output></span>
            <input id="dwell" type="range" min="1" max="30" step="0.5" value="10" />
          </label>
        </div>

        <div class="controls__row">
          <label class="field field--range">
            <span>Entry Speed <output id="bgInSpeedOut">0.84s</output></span>
            <input id="bgInSpeed" type="range" min="0.1" max="2" step="0.01" value="0.84" />
          </label>
          <label class="field field--range">
            <span>Entry Fade From <output id="bgEntryOpacityOut">0.32</output></span>
            <input id="bgEntryOpacity" type="range" min="0" max="1" step="0.01" value="0.32" />
          </label>
          <label class="field field--range">
            <span>Text Fade In Speed <output id="copyInSpeedOut">0.24s</output></span>
            <input id="copyInSpeed" type="range" min="0.1" max="2" step="0.01" value="0.24" />
          </label>
        </div>

        <div class="controls__row">
          <label class="field field--range">
            <span>Exit Speed <output id="bgOutSpeedOut">0.32s</output></span>
            <input id="bgOutSpeed" type="range" min="0.1" max="2" step="0.01" value="0.32" />
          </label>
          <label class="field field--range">
            <span>Exit Fade Speed <output id="copyOutSpeedOut">0.18s</output></span>
            <input id="copyOutSpeed" type="range" min="0.1" max="2" step="0.01" value="0.18" />
          </label>
          <label class="field field--range">
            <span>Exit Fade To <output id="bgExitOpacityOut">0.08</output></span>
            <input id="bgExitOpacity" type="range" min="0" max="1" step="0.01" value="0.08" />
          </label>
        </div>

        <div class="controls__row">
          <label class="field field--range">
            <span>Handoff Pause <output id="copyDelayOut">0.18s</output></span>
            <input id="copyDelay" type="range" min="0" max="1.2" step="0.01" value="0.18" />
          </label>
          <label class="field field--range">
            <span>Text Delay <output id="copyExitOpacityOut">0.14s</output></span>
            <input id="copyExitOpacity" type="range" min="0" max="1.2" step="0.01" value="0.14" />
          </label>
          <label class="field field--range">
            <span>Text Fade From <output id="copyEntryOpacityOut">0.04</output></span>
            <input id="copyEntryOpacity" type="range" min="0" max="1" step="0.01" value="0.04" />
          </label>
        </div>

        <div class="controls__row controls__row--actions">
          <button type="button" id="copyJson">Copy JSON</button>
          <button type="button" id="copyCss">Copy CSS</button>
          <button type="button" id="copyCapture">Copy Capture Card</button>
          <button type="button" id="resetSettings">Reset</button>
          <button type="button" id="copyUrl">Copy URL</button>
        </div>

        <div class="exports">
          <label class="field field--code">
            <span>JSON</span>
            <textarea id="jsonExport" readonly></textarea>
          </label>
          <label class="field field--code">
            <span>CSS (portable subset)</span>
            <textarea id="cssExport" readonly></textarea>
          </label>
          <label class="field field--code field--code-full">
            <span>Capture Card</span>
            <textarea id="captureExport" readonly></textarea>
          </label>
        </div>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
    <script type="module" src="./app.js"></script>
  </body>
</html>
