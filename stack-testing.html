<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Motion Lab - .stack/testing</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="lab">
      <header class="lab-header">
        <p class="lab-header__name">.stack/testing</p>
        <a class="lab-header__link" href="./index.html">Back to index</a>
      </header>

      <section class="preview-pane" aria-label="Component preview">
        <div class="preview-frame">
          <article class="stack-promo" data-component="stack-testing">
            <div class="stack-promo__columns">
              <section class="stack-promo__section" aria-labelledby="stack-heading">
                <h1 id="stack-heading" class="sr-only">Stack promo interaction test</h1>
                <ol class="stack-promo__list" id="stackList"></ol>
              </section>

              <figure class="stack-promo__figure" aria-live="polite" aria-atomic="true">
                <div class="stack-promo__image-shell" id="imageShell"></div>
              </figure>
            </div>
          </article>
        </div>
      </section>

      <section class="controls" aria-label="Motion controls">
        <div class="controls__row">
          <label class="field">
            <span>State</span>
            <select id="activeState"></select>
          </label>
          <label class="field">
            <span>Transition</span>
            <select id="transitionType">
              <option value="crossfade">Crossfade</option>
              <option value="slide-fade">Slide + Fade</option>
              <option value="swap">Swap (No Image Motion)</option>
            </select>
          </label>
          <label class="field">
            <span>Ease</span>
            <select id="easeName">
              <option value="power2.out">power2.out</option>
              <option value="power3.out">power3.out</option>
              <option value="power1.out">power1.out</option>
              <option value="sine.out">sine.out</option>
              <option value="expo.out">expo.out</option>
            </select>
          </label>
        </div>

        <div class="controls__row">
          <label class="field field--range">
            <span>Duration <output id="durationOut">0.55s</output></span>
            <input id="duration" type="range" min="0" max="1.5" step="0.01" value="0.55" />
          </label>
          <label class="field field--range">
            <span>Image Shift <output id="imageShiftOut">18px</output></span>
            <input id="imageShift" type="range" min="0" max="64" step="1" value="18" />
          </label>
          <label class="field field--range">
            <span>Indicator Duration <output id="indicatorDurationOut">0.45s</output></span>
            <input
              id="indicatorDuration"
              type="range"
              min="0"
              max="1.5"
              step="0.01"
              value="0.45"
            />
          </label>
        </div>

        <div class="controls__row controls__row--actions">
          <button type="button" id="copyJson">Copy JSON</button>
          <button type="button" id="copyCss">Copy CSS</button>
          <button type="button" id="resetSettings">Reset</button>
          <button type="button" id="copyUrl">Copy URL</button>
        </div>

        <div class="exports">
          <label class="field field--code">
            <span>JSON</span>
            <textarea id="jsonExport" readonly></textarea>
          </label>
          <label class="field field--code">
            <span>CSS (portable subset)</span>
            <textarea id="cssExport" readonly></textarea>
          </label>
        </div>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
    <script type="module" src="./app.js"></script>
  </body>
</html>
