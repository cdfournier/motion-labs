<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Motion Lab - .tabs/tests/mobile</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="lab">
      <header class="lab-header">
        <a class="lab-header__link" href="./index.html">Back to index</a>
        <span class="lab-header__sep" aria-hidden="true">/</span>
        <p class="lab-header__name">.tabs/tests/mobile</p>
      </header>

      <section class="preview-pane" aria-label="Component preview">
        <div class="preview-frame" data-preview-width="398">
          <article class="tabs-tests-mobile" data-component="tabs-tests-mobile">
            <section class="tabs-tests-mobile__carousel" aria-label="Test carousel">
              <div class="tabs-tests-mobile__viewport" id="tabsTestsMobileViewport">
                <div class="tabs-tests-mobile__track" id="tabsTestsMobileTrack"></div>
              </div>
            </section>

            <section class="tabs-tests-mobile__tablist" aria-label="Test list">
              <ol class="tabs-tests-mobile__list" id="tabsTestsMobileList"></ol>
              <div class="tabs-tests-mobile__shop-wrap">
                <a href="#" class="tabs-tests-mobile__shop-link">Shop Tests</a>
              </div>
            </section>
          </article>
        </div>
      </section>

      <section class="controls" aria-label="Motion controls">
        <div class="controls__row">
          <label class="field">
            <span>Motion Style</span>
            <select id="motionStyle">
              <option value="custom">Custom</option>
              <option value="subtle">Subtle</option>
              <option value="balanced">Balanced</option>
              <option value="dramatic">Dramatic + Graceful</option>
            </select>
          </label>
        </div>

        <div class="controls__row">
          <label class="field">
            <span>State</span>
            <select id="activeState"></select>
          </label>
          <label class="field">
            <span>Ease</span>
            <select id="easeName">
              <option value="power4.out">power4.out</option>
              <option value="power3.out">power3.out</option>
              <option value="power2.out">power2.out</option>
              <option value="power1.out">power1.out</option>
              <option value="sine.out">sine.out</option>
              <option value="expo.out">expo.out</option>
            </select>
          </label>
        </div>

        <div class="controls__row">
          <label class="field field--range">
            <span>Duration <output id="durationOut">0.95s</output></span>
            <input id="duration" type="range" min="0" max="3" step="0.01" value="0.95" />
          </label>
          <label class="field field--range">
            <span>Panel Shift <output id="panelShiftOut">40px</output></span>
            <input id="panelShift" type="range" min="0" max="140" step="1" value="40" />
          </label>
        </div>

        <div class="controls__row">
          <label class="field field--range">
            <span>Swipe Threshold <output id="swipeThresholdOut">56px</output></span>
            <input id="swipeThreshold" type="range" min="24" max="120" step="1" value="56" />
          </label>
        </div>

        <div class="controls__row controls__row--actions">
          <button type="button" id="copyJson">Copy JSON</button>
          <button type="button" id="copyCss">Copy CSS</button>
          <button type="button" id="copyCapture">Copy Capture Card</button>
          <button type="button" id="resetSettings">Reset</button>
          <button type="button" id="copyUrl">Copy URL</button>
        </div>

        <div class="exports">
          <label class="field field--code">
            <span>JSON</span>
            <textarea id="jsonExport" readonly></textarea>
          </label>
          <label class="field field--code">
            <span>CSS (portable subset)</span>
            <textarea id="cssExport" readonly></textarea>
          </label>
          <label class="field field--code field--code-full">
            <span>Capture Card</span>
            <textarea id="captureExport" readonly></textarea>
          </label>
        </div>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
    <script type="module" src="./app.js"></script>
  </body>
</html>
